<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сжатие сообщения омоглифами</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Сжатие сообщения омоглифами</h1>
      <p class="subtitle">
        Русские буквы-двойники заменяются на латинские. Подсчёт байт: кириллица
        = 2 байта, остальные символы = 1 байт.
      </p>

      <section class="panel">
        <label for="inputText">Исходный текст</label>
        <textarea
          id="inputText"
          placeholder="Введите сообщение..."
          rows="8"
        ></textarea>
        <div class="meta">
          <span>Размер: <strong id="inputByteCount">0</strong> байт</span>
        </div>
      </section>

      <section class="panel">
        <label for="outputText">Сжатое сообщение</label>
        <textarea id="outputText" rows="8" readonly></textarea>
        <div class="meta">
          <span>Размер: <strong id="outputByteCount">0</strong> байт</span>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
