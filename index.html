<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сжатие сообщения омоглифами</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <section class="panel">
        <label for="compressionMethod">Метод сжатия</label>
        <select id="compressionMethod">
          <option value="subtle">незаметный</option>
          <option value="strong">усиленный</option>
          <option value="custom">пользовательский</option>
        </select>

        <label for="inputText">Исходный текст</label>
        <textarea
          id="inputText"
          placeholder="Введите сообщение..."
          rows="8"
        ></textarea>
        <div class="meta">
          <span>Размер: <strong id="inputByteCount">0</strong> байт</span>
        </div>
      </section>

      <section class="panel">
        <label for="outputText">Сжатое сообщение</label>
        <textarea id="outputText" rows="8" readonly></textarea>
        <div class="meta">
          <span>
            Размер: <strong id="outputByteCount">0</strong> байт
            <strong id="compressionRate" class="compression-rate">
              Сжато на 0%
            </strong>
          </span>
          <div class="actions">
            <button id="copyBtn" type="button">Скопировать</button>
            <button id="clearBtn" class="secondary" type="button">Очистить</button>
          </div>
        </div>
      </section>

      <section id="customDictionaryPanel" class="panel custom-dictionary" hidden>
        <div class="dictionary-header">
          <div>
            <h2>Пользовательский словарь</h2>
            <p>Включайте только те замены, которые нужно использовать.</p>
          </div>
        </div>
        <div id="customDictionaryRows" class="dictionary-rows"></div>
        <button id="addDictionaryRowBtn" type="button" class="add-row-button">
          +
        </button>
      </section>
    </main>
    <div id="copyToast" class="toast" role="status" aria-live="polite">
      Скопировано
    </div>

    <script src="./script.js"></script>
  </body>
</html>
